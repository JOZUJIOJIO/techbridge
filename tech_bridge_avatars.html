<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Bridge Avatar Concepts</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&display=swap" rel="stylesheet">
    <style>
        :root {
            --orange-main: #e95d21;
            --green-main: #008C8C;
            --bg-warm-black: #1A1A18;
            --text-white: #FFFFFF;
        }

        body {
            background-color: var(--bg-warm-black);
            color: var(--text-white);
            font-family: 'Syne', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px;
        }

        h1 {
            margin-bottom: 60px;
            font-weight: 800;
            letter-spacing: -1px;
        }

        .avatar-container {
            display: flex;
            gap: 60px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .avatar-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .avatar-label {
            font-family: monospace;
            font-size: 14px;
            color: #888;
            margin-top: 10px;
        }

        .download-btn {
            padding: 8px 16px;
            background: #333;
            color: white;
            border: 1px solid #555;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            text-decoration: none;
            transition: all 0.2s;
        }

        .download-btn:hover {
            background: var(--orange-main);
            border-color: var(--orange-main);
        }

        svg {
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            border-radius: 24%; /* Squircle-ish for App Icon feel */
            transition: transform 0.3s ease;
        }

        svg:hover {
            transform: translateY(-5px);
        }
    </style>
</head>
<body>

    <h1>Tech Bridge Avatar Concepts</h1>

    <div class="avatar-container">
        
        <!-- Option A: Minimalist Symbol -->
        <div class="avatar-box">
            <svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="bg-grad-dark" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#2C2C28;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#1A1A18;stop-opacity:1" />
                    </linearGradient>
                    <linearGradient id="bridge-grad" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%" style="stop-color:#e95d21;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#008C8C;stop-opacity:1" />
                    </linearGradient>
                </defs>
                <!-- Background -->
                <rect width="200" height="200" fill="url(#bg-grad-dark)"/>
                
                <!-- Bridge Icon -->
                <g transform="translate(40, 60) scale(1.2)">
                    <rect x="10" y="20" width="7" height="34" rx="3.5" fill="url(#bridge-grad)"/>
                    <rect x="83" y="20" width="7" height="34" rx="3.5" fill="url(#bridge-grad)"/>
                    <path d="M13.5 22 Q 50 -10 86.5 22" fill="none" stroke="url(#bridge-grad)" stroke-width="6" stroke-linecap="round"/>
                    <rect x="5" y="45" width="90" height="6" rx="3" fill="url(#bridge-grad)"/>
                </g>
            </svg>
            <div class="avatar-label">Option A: Minimalist Symbol</div>
        </div>

        <!-- Option B: High-Impact Text -->
        <div class="avatar-box">
            <svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                <!-- Background -->
                <rect width="200" height="200" fill="#e95d21"/>
                
                <!-- Text -->
                <text x="50%" y="55%" dominant-baseline="middle" text-anchor="middle" 
                      font-family="'Syne', sans-serif" font-weight="800" font-size="100" fill="#FFFFFF" letter-spacing="-5">
                    TB
                </text>
            </svg>
            <div class="avatar-label">Option B: High-Impact Text</div>
        </div>

        <!-- Option C: Tech Texture -->
        <div class="avatar-box">
            <svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="bg-grad-green" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#008C8C;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#004D4D;stop-opacity:1" />
                    </linearGradient>
                    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
                        <path d="M 20 0 L 0 0 0 20" fill="none" stroke="white" stroke-width="0.5" opacity="0.1"/>
                    </pattern>
                </defs>
                <!-- Background -->
                <rect width="200" height="200" fill="url(#bg-grad-green)"/>
                <rect width="200" height="200" fill="url(#grid)"/>
                
                <!-- Abstract Shape -->
                <circle cx="100" cy="100" r="60" fill="none" stroke="white" stroke-width="2" opacity="0.2"/>
                <circle cx="100" cy="100" r="40" fill="none" stroke="white" stroke-width="4" opacity="0.8"/>
                <circle cx="100" cy="100" r="10" fill="#e95d21"/>
            </svg>
            <div class="avatar-label">Option C: Tech Texture</div>
        </div>

    </div>

</body>
</html>
