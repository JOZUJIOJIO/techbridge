<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Bridge Logo 1:1</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Syne', sans-serif;
        }

        /* 1:1 容器 */
        .logo-container {
            width: 800px;  /* 可根据需要调整尺寸，保持宽高一致即可 */
            height: 800px;
            background-color: #1A1A18; /* 暖黑背景 */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        /* 文字通用样式 */
        .text-line {
            font-weight: 800;
            text-transform: uppercase;
            line-height: 0.9; /* 匹配首页 Hero 标题 */
            letter-spacing: -0.04em; /* 匹配首页 Hero 标题 */
            text-align: center;
            width: 100%;
        }

        /* 第一行 TECH */
        .line-tech {
            color: #FFFFFF;
            font-size: 190px; /* 根据容器大小调整 */
        }

        /* 第二行 BRIDGE */
        .line-bridge {
            font-size: 190px; /* 保持与上一行一致或微调视觉平衡 */
        }

        /* 颜色定义 */
        .text-orange {
            color: #e95d21; /* 爱马仕橙 */
        }

        .text-green {
            color: #008C8C; /* 马尔斯绿 */
        }

        /* 辅助线（可选，用于查看居中情况） */
        /* .logo-container::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 1px;
            background: red;
            opacity: 0.2;
        } */
    </style>
</head>
<body>

    <!-- 1:1 Logo 容器 -->
    <div class="logo-container">
        <div class="text-line line-tech">TECH</div>
        <div class="text-line line-bridge">
            <span class="text-orange">BRI</span><span class="text-green">DGE</span>
        </div>
    </div>

</body>
</html>
